<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Investor | ICDEX - GOCFX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .reg-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 1.5rem; text-align: center; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-submit:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }

        #responseMsg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="reg-container">
    <h2>Registrasi Investor/Pelanggan</h2>
    <p class="subtitle">Silakan isi data di bawah ini untuk memulai layanan GOCFX</p>

    <form id="registrationForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="contoh@email.com" required>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama" placeholder="Sesuai KTP / Nama Akun" required>
        </div>

        <div class="form-group">
            <label>Nomor WhatsApp Aktif</label>
            <input type="tel" name="wa" placeholder="0812xxxx" required>
        </div>

        <div class="form-group">
            <label>Kota / Domisili</label>
            <input type="text" name="kota" required>
        </div>       
            <div class="form-group">
                <label>Rencana Modal</label>
                <select name="modal" required>
                    <option value="">Pilih...</option>
                    <option value="$100 - $500">$100 - $500</option>
                    <option value="$1,000 - $5,000">$1,000 - $5,000</option>
                    <option value=">$10,000">> $100,000</option>
                </select>
            </div>
            <div class="form-group">
                <label>Robot yang Diminati</label>
                <select name="robot" required>
                    <option value="GOCFX-Gold-Co">GOCFX-Gold-Conservative</option>
                    <option value="GOCFX-Gold-Mo">GOCFX-Gold-Moderate</option>
                    <option value="GOCFX-Gold-Ag">GOCFX-Gold-Agressive</option>
                    <option value="GOCFX-Currency-Co">GOCFX-Currency-Conservative</option>
                     <option value="GOCFX-Currency-Mo">GOCFX-Currency-Moderate</option>
                     <option value="GOCFX-Currency-Ag">GOCFX-Currency-Agressive</option>
                    <option value="GOCFX-Crypto-Co">GOCFX-Crypto-Conservative</option>
                    <option value="GOCFX-Crypto-Mo">GOCFX-Crypto-Moderate</option>
                    <option value="GOCFX-Crypto-Ag">GOCFX-Crypto-Agressive</option>
                    <option value="GOCFX-Oil-Co">GOCFX-Oil-Conservative</option>
                    <option value="GOCFX-Oil-Mo">GOCFX-Oil-Moderate</option>
                    <option value="GOCFX-Oil-Ag">GOCFX-Oil-Agressive</option>
                </select>
            </div>
                <div class="form-group">
            <label>Tujuan Investasi</label>
            <input type="text" name="tujuan" placeholder="Misal: Passive Income harian">
        </div>

        <div class="form-group">
            <label>Pengalaman Trading</label>
            <select name="pengalaman">
                <option value="Pemula">Pemula (Belum pernah)</option>
                <option value="Menengah">Menengah (Sudah paham)</option>
                <option value="Ahli">Ahli (Sudah lama trading)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Model Layanan</label>
            <select name="model" required>
                <option value="Copy Trading">Copy Trading</option>
                <option value="Sewa Robot">Sewa Robot (Private)</option>
                <option value="PAMM Account">PAMM Account</option>
            </select>
        </div>

        <div class="form-group">
            <label>Kapan Ingin Mulai?</label>
            <input type="text" name="kapan" placeholder="Misal: Segera setelah setup selesai">
        </div>

        <input type="hidden" name="persetujuan" value="SETUJU - Melalui Website GOCFX">

        <button type="submit" class="btn-submit" id="submitBtn">Kirim Data Pendaftaran</button>
    </form>
    
    <div id="responseMsg"></div>
    <a href="index.html" style="display:block; text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:20px; text-decoration:none;">← Kembali ke Halaman Utama</a>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwnOsES1SAmS8tz7t-xkdcM0serhN9Fywo0HqZIzCBm5Lq9-fjKNelyEzb2UWCwnzZ5oA/exec';
    const form = document.getElementById('registrationForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMsg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Sedang Mengirim Data...';
        msg.style.display = 'block';
        msg.innerHTML = 'Memproses pendaftaran Anda...';
        msg.style.color = 'var(--text-muted)';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', // Mencegah error CORS di browser
            body: JSON.stringify(data) 
        })
        .then(() => {
            msg.innerHTML = '✅ Data berhasil dikirim! Kami akan menghubungi Anda melalui WhatsApp.';
            msg.style.color = 'var(--primary)';
            form.reset();
            btn.innerText = 'Terkirim';
        })
        .catch(error => {
            msg.innerHTML = '❌ Terjadi kesalahan. Silakan coba lagi.';
            msg.style.color = '#ef4444';
            btn.disabled = false;
            btn.innerText = 'Kirim Data Pendaftaran';
            console.error('Error!', error.message);
        });
    });
</script>

</body>
</html>
